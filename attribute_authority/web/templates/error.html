{% extends "base.html" %}

{% block title %}Error — Attribute Authority{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-7 col-xl-6">
        <div class="card surface-card border-danger-subtle overflow-hidden text-center">
            <div class="card-header bg-danger-subtle text-danger-emphasis py-3">
                <h1 class="h4 mb-0 d-inline-flex align-items-center gap-2">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    Error
                </h1>
            </div>
            <div class="card-body p-5">
                <p class="lead mb-4">{{ message }}</p>
                <div class="d-flex flex-wrap justify-content-center gap-2">
                    <a href="/" class="btn btn-outline-danger btn-lg d-inline-flex align-items-center gap-2">
                        <i class="bi bi-house"></i>
                        Return to Home
                    </a>
                    <a href="/docs" class="btn btn-outline-secondary btn-lg d-inline-flex align-items-center gap-2">
                        <i class="bi bi-file-earmark-code"></i>
                        API Docs
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
