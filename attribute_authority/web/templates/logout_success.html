{% extends "base.html" %}

{% block title %}Logged Out — Attribute Authority{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card surface-card border-success-subtle overflow-hidden text-center">
            <div class="card-header bg-success-subtle text-success-emphasis py-3">
                <h1 class="h4 mb-0 d-inline-flex align-items-center gap-2">
                    <i class="bi bi-check-circle-fill"></i>
                    Logout Successful
                </h1>
            </div>
            <div class="card-body p-5">
                <p class="card-text text-body-secondary mb-4">Your session has been cleared. You can sign in again at any time using one of the configured OIDC providers.</p>
                <div class="d-grid gap-2">
                    <a href="/" class="btn btn-primary btn-lg">Return to Dashboard</a>
                    <a href="/login" class="btn btn-outline-secondary btn-lg">Sign In Again</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
