{% extends "base.html" %}

{% block title %}{{ title }} — Attribute Authority{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-7 col-xl-6">
        <div class="card surface-card {% if success %}border-success-subtle{% else %}border-danger-subtle{% endif %} overflow-hidden text-center">
            <div class="card-header {% if success %}bg-success-subtle text-success-emphasis{% else %}bg-danger-subtle text-danger-emphasis{% endif %} py-3">
                <h1 class="h4 mb-0 d-inline-flex align-items-center gap-2">
                    {% if success %}
                        <i class="bi bi-check-circle-fill"></i>
                    {% else %}
                        <i class="bi bi-exclamation-triangle-fill"></i>
                    {% endif %}
                    {{ title }}
                </h1>
            </div>
            <div class="card-body p-5">
                <p class="lead mb-4">{{ message }}</p>
                <a href="/" class="btn btn-outline-secondary d-inline-flex align-items-center gap-2">
                    <i class="bi bi-house"></i>
                    Return to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
